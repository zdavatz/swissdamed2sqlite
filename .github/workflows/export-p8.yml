name: Export Apple API Key
on: workflow_dispatch
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Save p8 key as artifact
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          echo "$APPLE_API_KEY_P8" | base64 --decode > AuthKey_${APPLE_API_KEY_ID}.p8
          echo "Saved AuthKey_${APPLE_API_KEY_ID}.p8"
      - uses: actions/upload-artifact@v4
        with:
          name: apple-api-key
          path: AuthKey_*.p8
          retention-days: 1
