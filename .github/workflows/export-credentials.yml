name: Export credentials to local file
on: workflow_dispatch
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Save credentials
        env:
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Write credentials to a JSON, then upload as artifact
          cat > credentials_local.json << CEOF
          {
            "apple": {
              "api_issuer_id": "$APPLE_API_ISSUER_ID",
              "api_key_id": "$APPLE_API_KEY_ID"
            },
            "azure": {
              "client_secret": "$MSSTORE_CLIENT_SECRET"
            }
          }
          CEOF
          echo "Credentials file created"
      - uses: actions/upload-artifact@v4
        with:
          name: credentials-local
          path: credentials_local.json
          retention-days: 1
