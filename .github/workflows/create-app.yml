name: Create App in App Store Connect
on: workflow_dispatch
jobs:
  create:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create App via App Store Connect API
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          # Write API key
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          # Generate JWT token
          pip3 install pyjwt cryptography
          TOKEN=$(python3 << 'PYEOF'
          import jwt, time, os
          key_id = os.environ["APPLE_API_KEY_ID"]
          issuer_id = os.environ["APPLE_API_ISSUER_ID"]
          with open(os.path.expanduser(f"~/.private_keys/AuthKey_{key_id}.p8")) as f:
              private_key = f.read()
          now = int(time.time())
          payload = {
              "iss": issuer_id,
              "iat": now,
              "exp": now + 1200,
              "aud": "appstoreconnect-v1"
          }
          token = jwt.encode(payload, private_key, algorithm="ES256", headers={"kid": key_id, "typ": "JWT"})
          print(token)
          PYEOF
          )
          echo "Got JWT token"

          AUTH="Authorization: Bearer $TOKEN"
          API="https://api.appstoreconnect.apple.com/v1"

          # Step 1: Register Bundle ID
          echo "==> Registering Bundle ID..."
          BUNDLE_RESP=$(curl -s -X POST "$API/bundleIds" \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d '{
              "data": {
                "type": "bundleIds",
                "attributes": {
                  "identifier": "com.ywesee.swissdamed2sqlite",
                  "name": "Swissdamed2Sqlite",
                  "platform": "MAC_OS"
                }
              }
            }')
          echo "$BUNDLE_RESP" | python3 -m json.tool 2>/dev/null || echo "$BUNDLE_RESP"

          # Extract bundle ID resource id
          BUNDLE_ID=$(echo "$BUNDLE_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['id'])" 2>/dev/null)
          if [ -z "$BUNDLE_ID" ]; then
            echo "Bundle ID may already exist, searching..."
            SEARCH_RESP=$(curl -s "$API/bundleIds?filter[identifier]=com.ywesee.swissdamed2sqlite" -H "$AUTH")
            BUNDLE_ID=$(echo "$SEARCH_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'])" 2>/dev/null)
            echo "Found existing Bundle ID: $BUNDLE_ID"
          else
            echo "Created Bundle ID: $BUNDLE_ID"
          fi

          # Step 2: Create App
          echo "==> Creating App in App Store Connect..."
          APP_RESP=$(curl -s -X POST "$API/apps" \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d "{
              \"data\": {
                \"type\": \"apps\",
                \"attributes\": {
                  \"name\": \"Swissdamed2Sqlite\",
                  \"primaryLocale\": \"en-US\",
                  \"sku\": \"swissdamed2sqlite\",
                  \"bundleId\": \"com.ywesee.swissdamed2sqlite\"
                },
                \"relationships\": {
                  \"bundleId\": {
                    \"data\": {
                      \"type\": \"bundleIds\",
                      \"id\": \"$BUNDLE_ID\"
                    }
                  }
                }
              }
            }")
          echo "$APP_RESP" | python3 -m json.tool 2>/dev/null || echo "$APP_RESP"

          APP_ID=$(echo "$APP_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['id'])" 2>/dev/null)
          if [ -n "$APP_ID" ]; then
            echo "==> App created! App ID: $APP_ID"
          else
            echo "==> App may already exist or creation failed. Check output above."
          fi

          # Step 3: Create Provisioning Profile
          echo "==> Creating Mac App Store provisioning profile..."

          # Get the Mac App Distribution certificate ID
          CERTS_RESP=$(curl -s "$API/certificates?filter[certificateType]=MAC_APP_DISTRIBUTION" -H "$AUTH")
          CERT_ID=$(echo "$CERTS_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'])" 2>/dev/null)
          echo "Certificate ID: $CERT_ID"

          if [ -n "$CERT_ID" ] && [ -n "$BUNDLE_ID" ]; then
            PROFILE_RESP=$(curl -s -X POST "$API/profiles" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{
                \"data\": {
                  \"type\": \"profiles\",
                  \"attributes\": {
                    \"name\": \"Swissdamed2Sqlite Mac App Store\",
                    \"profileType\": \"MAC_APP_STORE\"
                  },
                  \"relationships\": {
                    \"bundleId\": {
                      \"data\": {
                        \"type\": \"bundleIds\",
                        \"id\": \"$BUNDLE_ID\"
                      }
                    },
                    \"certificates\": {
                      \"data\": [
                        {
                          \"type\": \"certificates\",
                          \"id\": \"$CERT_ID\"
                        }
                      ]
                    }
                  }
                }
              }")
            echo "$PROFILE_RESP" | python3 -m json.tool 2>/dev/null || echo "$PROFILE_RESP"

            # Extract and save profile content (base64)
            PROFILE_CONTENT=$(echo "$PROFILE_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['attributes']['profileContent'])" 2>/dev/null)
            if [ -n "$PROFILE_CONTENT" ]; then
              echo "==> Provisioning profile created!"
              echo "PROFILE_BASE64=$PROFILE_CONTENT" >> $GITHUB_OUTPUT
              echo "::notice::Provisioning profile created. Update MACOS_PROVISIONING_PROFILE secret with the base64 content from the workflow log."
              # Save to file for verification
              echo "$PROFILE_CONTENT" | base64 --decode > swissdamed2sqlite.provisionprofile
              echo "Profile saved. Size: $(wc -c < swissdamed2sqlite.provisionprofile) bytes"
            fi
          else
            echo "==> Skipping profile creation (missing cert or bundle ID)"
          fi

      - name: Upload provisioning profile artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provisioning-profile
          path: swissdamed2sqlite.provisionprofile
          if-no-files-found: ignore
