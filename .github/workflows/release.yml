name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Sync Cargo.toml version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" Cargo.toml
          echo "Version set to: $TAG_VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build universal binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/swissdamed2sqlite \
            target/x86_64-apple-darwin/release/swissdamed2sqlite \
            -output target/release/swissdamed2sqlite-universal

      - name: Create .app bundle
        run: |
          APP="target/release/swissdamed2sqlite.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/swissdamed2sqlite-universal "$APP/Contents/MacOS/swissdamed2sqlite"
          cp assets/icon.icns "$APP/Contents/Resources/AppIcon.icns" 2>/dev/null || true
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>swissdamed2sqlite</string>
              <key>CFBundleDisplayName</key><string>swissdamed2sqlite</string>
              <key>CFBundleIdentifier</key><string>com.ywesee.swissdamed2sqlite</string>
              <key>CFBundleVersion</key><string>${VERSION}</string>
              <key>CFBundleShortVersionString</key><string>${VERSION}</string>
              <key>CFBundleExecutable</key><string>swissdamed2sqlite</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>NSHighResolutionCapable</key><true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key><true/>
              <key>LSMinimumSystemVersion</key><string>11.0</string>
              <key>LSApplicationCategoryType</key><string>public.app-category.business</string>
          </dict>
          </plist>
          EOF

      - name: Import signing certificates
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          MACOS_DEVELOPER_ID_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          security list-keychains -d user -s build.keychain

          echo "$MACOS_CERTIFICATE" | base64 --decode > app_cert.p12
          security import app_cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          rm app_cert.p12

          if [ -n "$MACOS_INSTALLER_CERTIFICATE" ]; then
            echo "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode > installer_cert.p12
            security import installer_cert.p12 -k build.keychain -P "$MACOS_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
            rm installer_cert.p12
          fi

          if [ -n "$MACOS_DEVELOPER_ID_CERTIFICATE" ]; then
            echo "$MACOS_DEVELOPER_ID_CERTIFICATE" | base64 --decode > devid_cert.p12
            security import devid_cert.p12 -k build.keychain -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
            rm devid_cert.p12
          fi

          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          echo "Available signing identities:"
          security find-identity -v build.keychain

      - name: Code sign app for DMG (Developer ID)
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          IDENTITY=$(security find-identity -v build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No 'Developer ID Application' certificate found."
            security find-identity -v build.keychain
            exit 1
          fi
          echo "Signing with: $IDENTITY"
          codesign --force --options runtime \
            --sign "$IDENTITY" \
            --entitlements entitlements.plist \
            --deep \
            target/release/swissdamed2sqlite.app

      - name: Create DMG
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          STAGING=$(mktemp -d)
          cp -R target/release/swissdamed2sqlite.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "swissdamed2sqlite" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "swissdamed2sqlite-${VERSION}-macos-universal.dmg"
          rm -rf "$STAGING"

      - name: Notarize DMG (if API key available)
        if: env.APPLE_API_KEY_P8 != ''
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          DMG="swissdamed2sqlite-${VERSION}-macos-universal.dmg"

          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          xcrun notarytool submit "$DMG" \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: swissdamed2sqlite-*-macos-universal.dmg

      - name: Build App Store package (if API key available)
        if: env.APPLE_API_KEY_P8 != ''
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          MACOS_PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          APP="target/release/swissdamed2sqlite.app"

          if [ -n "$MACOS_PROVISIONING_PROFILE" ]; then
            echo "$MACOS_PROVISIONING_PROFILE" | base64 --decode > "$APP/Contents/embedded.provisionprofile"
          fi

          APP_IDENTITY=$(security find-identity -v build.keychain | grep "Mac App Distribution\|3rd Party Mac Developer Application" | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -n "$APP_IDENTITY" ]; then
            codesign --force --options runtime \
              --sign "$APP_IDENTITY" \
              --entitlements entitlements-appstore.plist \
              --deep \
              "$APP"
          fi

          INSTALLER_IDENTITY=$(security find-identity -v build.keychain | grep "Mac Installer Distribution\|3rd Party Mac Developer Installer" | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -n "$INSTALLER_IDENTITY" ]; then
            productbuild --component "$APP" /Applications \
              --sign "$INSTALLER_IDENTITY" \
              "swissdamed2sqlite-${VERSION}-macos-appstore.pkg"
          else
            productbuild --component "$APP" /Applications \
              "swissdamed2sqlite-${VERSION}-macos-appstore.pkg"
          fi

          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          TRANSPORTER="/Applications/Transporter.app/Contents/itms/bin/iTMSTransporter"
          if [ -x "$TRANSPORTER" ]; then
            "$TRANSPORTER" -m upload \
              -f "swissdamed2sqlite-${VERSION}-macos-appstore.pkg" \
              -apiKey "$APPLE_API_KEY_ID" \
              -apiIssuer "$APPLE_API_ISSUER_ID" || echo "WARNING: iTMSTransporter upload failed"
          else
            xcrun altool --upload-app \
              --file "swissdamed2sqlite-${VERSION}-macos-appstore.pkg" \
              --type macos \
              --apiKey "$APPLE_API_KEY_ID" \
              --apiIssuer "$APPLE_API_ISSUER_ID" || echo "WARNING: App Store upload failed"
          fi

      - name: Upload App Store pkg artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-appstore-pkg
          path: swissdamed2sqlite-*-macos-appstore.pkg
          if-no-files-found: ignore

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Sync Cargo.toml version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" Cargo.toml
          echo "Version set to: $TAG_VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libfuse2

      - name: Build
        run: cargo build --release

      - name: Create tar.gz
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          mkdir -p dist/swissdamed2sqlite
          cp target/release/swissdamed2sqlite dist/swissdamed2sqlite/
          cp README.md dist/swissdamed2sqlite/
          tar -czf "swissdamed2sqlite-${VERSION}-linux-x86_64.tar.gz" -C dist swissdamed2sqlite

      - name: Create AppImage
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps AppDir/usr/share/applications

          cp target/release/swissdamed2sqlite AppDir/usr/bin/
          cp assets/icon_256x256.png AppDir/usr/share/icons/hicolor/256x256/apps/swissdamed2sqlite.png 2>/dev/null || true
          cp assets/icon_256x256.png AppDir/swissdamed2sqlite.png 2>/dev/null || true

          cat > AppDir/swissdamed2sqlite.desktop << DESKTOP
          [Desktop Entry]
          Name=swissdamed2sqlite
          Exec=swissdamed2sqlite
          Icon=swissdamed2sqlite
          Type=Application
          Categories=Office;
          Comment=Swissdamed UDI data to CSV and SQLite converter
          DESKTOP

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/swissdamed2sqlite" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir "swissdamed2sqlite-${VERSION}-linux-x86_64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            swissdamed2sqlite-*-linux-x86_64.tar.gz
            swissdamed2sqlite-*-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Cargo.toml version from git tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" Cargo.toml
          echo "Version set to: $TAG_VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\swissdamed2sqlite.exe dist\
          Compress-Archive -Path dist\* -DestinationPath "swissdamed2sqlite-${version}-windows-x64.zip"

      - name: Create MSIX package
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | Select-Object -First 1).Matches.Groups[1].Value

          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\makeappx.exe" -ErrorAction SilentlyContinue | Sort-Object -Descending | Select-Object -First 1
          if (-not $sdkBin) {
            Write-Error "makeappx.exe not found in Windows SDK"
            exit 1
          }
          $sdkDir = $sdkBin.DirectoryName

          $msixDir = "msix_staging"
          New-Item -ItemType Directory -Force -Path $msixDir
          Copy-Item target\release\swissdamed2sqlite.exe $msixDir\

          $manifest = Get-Content windows\AppxManifest.xml -Raw
          $manifest = $manifest -replace 'Version="1\.0\.0\.0"', "Version=`"${version}.0`""
          Set-Content -Path "$msixDir\AppxManifest.xml" -Value $manifest

          New-Item -ItemType Directory -Force -Path "$msixDir\assets"
          Copy-Item windows\assets\* "$msixDir\assets\"

          & "$sdkDir\makeappx.exe" pack /d $msixDir /p "swissdamed2sqlite-${version}-windows-x64.msix" /o

      - name: Sign MSIX (if certificate available)
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object -Descending | Select-Object -First 1
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          & $sdkBin.FullName sign /fd SHA256 /a /f cert.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD "swissdamed2sqlite-${version}-windows-x64.msix"
          Remove-Item cert.pfx

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            swissdamed2sqlite-*-windows-x64.zip
            swissdamed2sqlite-*-windows-x64.msix

  release:
    needs: [build-macos, build-windows, build-linux]
    if: always() && (needs.build-windows.result == 'success' || needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-packages/*.zip
            artifacts/windows-packages/*.msix
            artifacts/linux-packages/*.tar.gz
            artifacts/linux-packages/*.AppImage
          generate_release_notes: true

  publish-microsoft-store:
    needs: [build-windows]
    runs-on: windows-latest
    if: vars.MSSTORE_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: artifacts

      - name: Publish to Microsoft Store
        shell: pwsh
        env:
          MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
          MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
        run: |
          $msix = Get-ChildItem artifacts/*.msix | Select-Object -First 1
          Write-Host "Submitting: $($msix.FullName)"

          # Get OAuth2 token from Azure AD
          $tokenBody = @{
            grant_type    = "client_credentials"
            client_id     = $env:MSSTORE_CLIENT_ID
            client_secret = $env:MSSTORE_CLIENT_SECRET
            resource      = "https://manage.devcenter.microsoft.com"
          }
          $tokenResp = Invoke-RestMethod -Method Post `
            -Uri "https://login.microsoftonline.com/$($env:MSSTORE_TENANT_ID)/oauth2/token" `
            -Body $tokenBody
          $token = $tokenResp.access_token

          $headers = @{
            Authorization = "Bearer $token"
            "Content-Type" = "application/json"
          }

          $appId = "9MVMQ21R4MKC"
          $appResp = Invoke-RestMethod -Method Get `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId" `
            -Headers $headers

          if ($appResp.pendingApplicationSubmission) {
            $pendingId = $appResp.pendingApplicationSubmission.id
            Invoke-RestMethod -Method Delete `
              -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions/$pendingId" `
              -Headers $headers
          }

          $subResp = Invoke-RestMethod -Method Post `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions" `
            -Headers $headers
          $subId = $subResp.id
          $uploadUrl = $subResp.fileUploadUrl

          $submission = $subResp
          $msixFileName = $msix.Name

          $submission.applicationCategory = "BooksAndReference_EReader"
          $submission.allowTargetFutureDeviceFamilies = @{
            Desktop = $true; Mobile = $false; Xbox = $false; Holographic = $false
          }
          $submission.allowMicrosoftDecideAppAvailabilityToFutureDeviceFamilies = $true

          $submission.hasExternalInAppProducts = $false
          $submission.meetAccessibilityGuidelines = $true
          $submission.canInstallOnRemovableMedia = $true
          $submission.automaticBackupEnabled = $true
          $submission.hardwarePreferences = @("Keyboard", "Mouse")
          $submission.notesForCertification = "Desktop utility for downloading Swiss medical device data from swissdamed.ch and exporting as CSV/SQLite. Requires internet access. No login required. Contact: zdavatz@ywesee.com"

          $releaseNotes = "$env:GITHUB_REF_NAME`: $(git log -1 --format=%s)"
          $descriptionDe = "Swissdamed UDI-Daten herunterladen und als CSV oder SQLite exportieren. Open Source (GPL v3)."
          $descriptionEn = "Download Swissdamed UDI data and export as CSV or SQLite. Open Source (GPL v3)."

          $submission.listings = @{
            "de-de" = @{
              baseListing = @{
                title = "Swissdamed2Sqlite"
                description = $descriptionDe
                releaseNotes = $releaseNotes
                keywords = @("Swissdamed", "Medizinprodukte", "UDI", "CSV", "SQLite")
                copyrightAndTrademarkInfo = "Copyright 2026 ywesee GmbH"
                licenseTerms = "GNU General Public License v3.0"
                privacyPolicy = "https://github.com/zdavatz/swissdamed2sqlite"
                websiteUrl = "https://github.com/zdavatz/swissdamed2sqlite"
                supportContact = "zdavatz@ywesee.com"
                images = @()
              }
            }
            "en-us" = @{
              baseListing = @{
                title = "Swissdamed2Sqlite"
                description = $descriptionEn
                releaseNotes = $releaseNotes
                keywords = @("Swissdamed", "medical device", "UDI", "CSV", "SQLite")
                copyrightAndTrademarkInfo = "Copyright 2026 ywesee GmbH"
                licenseTerms = "GNU General Public License v3.0"
                privacyPolicy = "https://github.com/zdavatz/swissdamed2sqlite"
                websiteUrl = "https://github.com/zdavatz/swissdamed2sqlite"
                supportContact = "zdavatz@ywesee.com"
                images = @()
              }
            }
          }

          if ($submission.applicationPackages) {
            foreach ($pkg in $submission.applicationPackages) {
              $pkg.fileStatus = "PendingDelete"
            }
          } else {
            $submission.applicationPackages = @()
          }

          $submission.applicationPackages += @{
            fileName = $msixFileName
            fileStatus = "PendingUpload"
            minimumDirectXVersion = "None"
            minimumSystemRam = "None"
          }

          $updateBody = $submission | ConvertTo-Json -Depth 20 -Compress
          Invoke-RestMethod -Method Put `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions/$subId" `
            -Headers $headers `
            -Body $updateBody `
            -ContentType "application/json; charset=utf-8"

          $zipPath = [System.IO.Path]::Combine($env:TEMP, "upload.zip")
          Compress-Archive -Path $msix.FullName -DestinationPath $zipPath -Force
          $zipBytes = [System.IO.File]::ReadAllBytes($zipPath)
          Invoke-RestMethod -Method Put -Uri $uploadUrl `
            -Headers @{"x-ms-blob-type" = "BlockBlob"} `
            -Body $zipBytes `
            -ContentType "application/octet-stream"

          Invoke-RestMethod -Method Post `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions/$subId/commit" `
            -Headers $headers
