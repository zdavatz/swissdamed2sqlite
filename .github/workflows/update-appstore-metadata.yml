name: Update App Store Connect Metadata
on: workflow_dispatch
jobs:
  update:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Update App Store metadata via API
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set +e
          pip3 install --break-system-packages pyjwt cryptography

          # Write API key
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          # Generate JWT token
          TOKEN=$(python3 << 'PYEOF'
          import jwt, time, os
          key_id = os.environ["APPLE_API_KEY_ID"]
          issuer_id = os.environ["APPLE_API_ISSUER_ID"]
          with open(os.path.expanduser(f"~/.private_keys/AuthKey_{key_id}.p8")) as f:
              private_key = f.read()
          now = int(time.time())
          payload = {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}
          print(jwt.encode(payload, private_key, algorithm="ES256", headers={"kid": key_id, "typ": "JWT"}))
          PYEOF
          )
          AUTH="Authorization: Bearer $TOKEN"
          API="https://api.appstoreconnect.apple.com/v1"

          # Find the app
          echo "==> Finding app..."
          APP_RESP=$(curl -s -H "$AUTH" "$API/apps?filter%5BbundleId%5D=com.ywesee.swissdamed2sqlite")
          APP_ID=$(echo "$APP_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'])" 2>/dev/null)
          echo "App ID: $APP_ID"

          if [ -z "$APP_ID" ]; then
            echo "ERROR: App not found"
            exit 1
          fi

          # Find the latest macOS app store version
          echo "==> Finding app store version..."
          VER_RESP=$(curl -s -H "$AUTH" "$API/apps/$APP_ID/appStoreVersions?filter%5Bplatform%5D=MAC_OS")
          echo "$VER_RESP" | python3 -m json.tool 2>/dev/null | head -20
          VER_ID=$(echo "$VER_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'])" 2>/dev/null)
          echo "Version ID: $VER_ID"

          # Get the localizations for this version
          echo "==> Finding localizations..."
          LOC_RESP=$(curl -s -H "$AUTH" "$API/appStoreVersions/$VER_ID/appStoreVersionLocalizations")
          echo "$LOC_RESP" | python3 -m json.tool 2>/dev/null | head -30

          # Check if en-US localization exists
          EN_LOC_ID=$(echo "$LOC_RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for loc in d['data']:
              if loc['attributes']['locale'] == 'en-US':
                  print(loc['id'])
                  break
          " 2>/dev/null)
          echo "EN localization ID: $EN_LOC_ID"

          # Update or create en-US localization with metadata
          DESCRIPTION="Export Data from Swissdamed to SQLite or CSV with ease. Swissdamed2Sqlite helps you make sense of the Swiss Medical Device market. Download UDI (Unique Device Identification) products, look up SRNs for any CHRN, and match devices against MiGeL codes. All data is saved locally. Open Source (GPL v3)."
          KEYWORDS="Swissdamed, SQLite, CSV, UDI, medical device, Switzerland, MiGeL, SRN, CHRN"
          SUPPORT_URL="https://ywesee.com/Swissdamed2Sqlite/Swissdamed2Sqlite"
          MARKETING_URL="https://ywesee.com/Swissdamed2Sqlite/Swissdamed2Sqlite"
          WHATS_NEW="Swissdamed2Sqlite - make sense of the Swiss Medical Device market."

          if [ -n "$EN_LOC_ID" ]; then
            echo "==> Updating en-US localization..."
            curl -s -X PATCH -H "$AUTH" -H "Content-Type: application/json" \
              "$API/appStoreVersionLocalizations/$EN_LOC_ID" \
              -d "{
                \"data\": {
                  \"type\": \"appStoreVersionLocalizations\",
                  \"id\": \"$EN_LOC_ID\",
                  \"attributes\": {
                    \"description\": \"$DESCRIPTION\",
                    \"keywords\": \"$KEYWORDS\",
                    \"supportUrl\": \"$SUPPORT_URL\",
                    \"marketingUrl\": \"$MARKETING_URL\",
                    \"whatsNew\": \"$WHATS_NEW\"
                  }
                }
              }" | python3 -m json.tool 2>/dev/null | head -20
            echo "==> en-US updated!"
          else
            echo "==> Creating en-US localization..."
            curl -s -X POST -H "$AUTH" -H "Content-Type: application/json" \
              "$API/appStoreVersionLocalizations" \
              -d "{
                \"data\": {
                  \"type\": \"appStoreVersionLocalizations\",
                  \"attributes\": {
                    \"locale\": \"en-US\",
                    \"description\": \"$DESCRIPTION\",
                    \"keywords\": \"$KEYWORDS\",
                    \"supportUrl\": \"$SUPPORT_URL\",
                    \"marketingUrl\": \"$MARKETING_URL\",
                    \"whatsNew\": \"$WHATS_NEW\"
                  },
                  \"relationships\": {
                    \"appStoreVersion\": {
                      \"data\": {
                        \"type\": \"appStoreVersions\",
                        \"id\": \"$VER_ID\"
                      }
                    }
                  }
                }
              }" | python3 -m json.tool 2>/dev/null | head -20
            echo "==> en-US created!"
          fi

          # Also update the app-level info (copyright)
          echo "==> Finding app info..."
          INFO_RESP=$(curl -s -H "$AUTH" "$API/apps/$APP_ID/appInfos")
          INFO_ID=$(echo "$INFO_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'])" 2>/dev/null)
          echo "App Info ID: $INFO_ID"

          # Find app info localization
          INFO_LOC_RESP=$(curl -s -H "$AUTH" "$API/appInfos/$INFO_ID/appInfoLocalizations")
          EN_INFO_LOC_ID=$(echo "$INFO_LOC_RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for loc in d['data']:
              if loc['attributes']['locale'] == 'en-US':
                  print(loc['id'])
                  break
          " 2>/dev/null)
          echo "EN info localization ID: $EN_INFO_LOC_ID"

          if [ -n "$EN_INFO_LOC_ID" ]; then
            echo "==> Updating app info localization..."
            curl -s -X PATCH -H "$AUTH" -H "Content-Type: application/json" \
              "$API/appInfoLocalizations/$EN_INFO_LOC_ID" \
              -d "{
                \"data\": {
                  \"type\": \"appInfoLocalizations\",
                  \"id\": \"$EN_INFO_LOC_ID\",
                  \"attributes\": {
                    \"name\": \"Swissdamed2Sqlite\",
                    \"subtitle\": \"Export Swissdamed UDI Data\",
                    \"privacyPolicyUrl\": \"https://ywesee.com/Swissdamed2Sqlite/Pivacy\"
                  }
                }
              }" | python3 -m json.tool 2>/dev/null | head -20
            echo "==> App info updated!"
          fi

          # Update version string
          echo "==> Updating version to 0.1.2..."
          curl -s -X PATCH -H "$AUTH" -H "Content-Type: application/json" \
            "$API/appStoreVersions/$VER_ID" \
            -d "{
              \"data\": {
                \"type\": \"appStoreVersions\",
                \"id\": \"$VER_ID\",
                \"attributes\": {
                  \"versionString\": \"0.1.2\",
                  \"copyright\": \"2026 ywesee GmbH\"
                }
              }
            }" | python3 -m json.tool 2>/dev/null | head -20

          echo "==> All metadata updated!"
